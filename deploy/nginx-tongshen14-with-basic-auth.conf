# 可选：在 Nginx 上再给「整站」加一层 HTTP Basic 密码（与后台 Express 里的密码是两套）
#
# 1) 生成密码文件（把 youruser 换成用户名，按提示输入密码）：
#    sudo apt install apache2-utils   # Debian/Ubuntu
#    sudo dnf install httpd-tools     # Amazon Linux
#    sudo htpasswd -c /etc/nginx/.htpasswd_tongshen youruser
#
# 2) 用本文件内容替换 tongshen14 的 **443 那个 server { ... }**（或整文件替换 conf.d 里原配置）
#    注意：访问网站会先弹 Nginx 密码，进 /admin 若还开了 ADMIN_AUTH_PASSWORD 会再弹一次。
#
# 3) sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name tongshen14.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tongshen14.com;

    ssl_certificate     /etc/letsencrypt/live/tongshen14.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tongshen14.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic           "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_tongshen;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
