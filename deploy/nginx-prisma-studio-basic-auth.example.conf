# Prisma Studio does not support passwords. Typical pattern on AWS:
#
# 1) Run Studio on localhost only (internal port):
#    npx prisma studio --hostname 127.0.0.1 --port 5555
#
# 2) Nginx listens on a port you open in the security group (e.g. 15555) with HTTP Basic:
#
#    sudo htpasswd -c /etc/nginx/.htpasswd_prisma youruser
#
#    Include a server block like below (adjust ssl_certificate paths if using HTTPS).

# server {
#   listen 15555 ssl;
#   server_name your.domain.com;
#   ssl_certificate     /path/to/fullchain.pem;
#   ssl_certificate_key /path/to/privkey.pem;
#
#   auth_basic "Prisma Studio";
#   auth_basic_user_file /etc/nginx/.htpasswd_prisma;
#
#   location / {
#     proxy_pass http://127.0.0.1:5555;
#     proxy_http_version 1.1;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "upgrade";
#     proxy_set_header Host $host;
#   }
# }
