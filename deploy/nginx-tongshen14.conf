# 放到服务器：/etc/nginx/conf.d/tongshen14.conf
# （若你用的是 sites-enabled，则放到 sites-available 并做软链）
#
# 前置条件：
#   1) PM2 / Node 已在 127.0.0.1:3000 监听（与 .env 里 PORT 一致）
#   2) 证书已由 Certbot 签好（路径如下）
#
# 应用后执行：
#   sudo nginx -t && sudo systemctl reload nginx

# —— HTTP 统一跳 HTTPS ——
server {
    listen 80;
    listen [::]:80;
    server_name tongshen14.com;
    return 301 https://$host$request_uri;
}

# —— HTTPS：整站反代到 Node（不要再用 root /usr/share/nginx/html）——
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tongshen14.com;

    ssl_certificate     /etc/letsencrypt/live/tongshen14.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tongshen14.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 上传若需要更大体积可放开
    # client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
